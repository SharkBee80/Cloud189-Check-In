name: Cloud189 Checkin nodejs min

on:
  schedule:
    - cron: "0 1 * * *" # 每天 UTC 1:00 执行（北京时间早上 9:00）
  workflow_dispatch: # 支持手动触发

jobs:
  CheckIn:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 建立 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version: "24" # 推荐使用稳定的 LTS 版本

      - name: 安装依赖
        run: |
          npm i -g pnpm
          # pnpm i

      - name: 运行脚本
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          TG: ${{ secrets.TG }}
          Throw: ${{ secrets.Throw }}
        run: |
          pnpm run start:global
